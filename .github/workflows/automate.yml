name: Daily Auto-Trader

on:
  schedule:
    - cron: '55 19 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize-portfolio:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Linux Math Libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y liblapack3 libblas3

    - name: Install Data Science Packages
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas numpy pyomo idaes-pse

    - name: Install Pyomo Bonmin Solver
      run: |
        idaes get-extensions

    - name: Execute Daily Optimization
      run: |
        python daily_optimizer.py

    - name: Commit & Push New Allocations
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add latest_allocation.csv
        git commit -m "Automated Daily Rebalance: Update latest_allocation.csv" || exit 0
        git push
